services:
  # Infrastructure Services
  postgres:
    image: postgres:16-alpine
    container_name: memrag-postgres
    environment:
      POSTGRES_DB: memrag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - memrag-network

  redis:
    image: redis:7.2-alpine
    container_name: memrag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - memrag-network

  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: memrag-qdrant
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-memrag-secret}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - memrag-network

  minio:
    image: minio/minio:latest
    container_name: memrag-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - memrag-network

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: memrag-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
      - "7234:7234"
      - "7235:7235"
      - "7236:7236"
      - "7239:7239"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233 2>/dev/null | grep -q SERVING"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - memrag-network

  ollama:
    image: ollama/ollama:0.21.0
    container_name: memrag-ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - memrag-network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: memrag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - agent-workers
      - context-hydrator
      - knowledge-ingestion
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - memrag-network

  # Application Services
  connector-registry:
    build:
      context: ./services/connector-registry
      dockerfile: Dockerfile
    container_name: memrag-connector-registry
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/memrag?sslmode=disable
      TEMPORAL_HOST: temporal:7233
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_APP_CONFIG_APPLICATION_ID: ${AWS_APP_CONFIG_APPLICATION_ID:-}
      AWS_APP_CONFIG_ENVIRONMENT_ID: ${AWS_APP_CONFIG_ENVIRONMENT_ID:-}
      AWS_APP_CONFIG_PROFILE_ID: ${AWS_APP_CONFIG_PROFILE_ID:-}
      AWS_SECRETS_MANAGER_PREFIX: ${AWS_SECRETS_MANAGER_PREFIX:-/memrag/development}
      AWS_SECRETS_MANAGER_ENDPOINT_URL: ${AWS_SECRETS_MANAGER_ENDPOINT_URL:-}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - memrag-network

  agent-workers:
    build:
      context: .
      dockerfile: services/agent-workers/Dockerfile
    container_name: memrag-agent-workers
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      WORKSPACE_ID: ${WORKSPACE_ID:-default-workspace}
      TEMPORAL_HOST: temporal:7233
      QDRANT_HOST: qdrant:6333
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_DEVICE: ${OLLAMA_DEVICE:-cuda}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-gemma4:12b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-qwen3-embedding:4b}
      GRAPHITI_ENABLED: ${GRAPHITI_ENABLED:-false}
      GRAPHITI_SERVER_URL: ${GRAPHITI_SERVER_URL:-http://graphiti-server:8100}
      GRAPHITI_MCP_SERVER_URL: ${GRAPHITI_MCP_SERVER_URL:-http://graphiti-mcp:8101}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-memrag-neo4j}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_APP_CONFIG_APPLICATION_ID: ${AWS_APP_CONFIG_APPLICATION_ID:-}
      AWS_APP_CONFIG_ENVIRONMENT_ID: ${AWS_APP_CONFIG_ENVIRONMENT_ID:-}
      AWS_APP_CONFIG_PROFILE_ID: ${AWS_APP_CONFIG_PROFILE_ID:-}
    ports:
      - "8080:8080"
    depends_on:
      temporal:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - memrag-network

  context-hydrator:
    build:
      context: ./services/context-hydrator
      dockerfile: Dockerfile
    container_name: memrag-context-hydrator
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      WORKSPACE_ID: ${WORKSPACE_ID:-default-workspace}
      REDIS_URL: redis://redis:6379
      QDRANT_HOST: qdrant:6333
      OLLAMA_HOST: http://ollama:11434
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_APP_CONFIG_APPLICATION_ID: ${AWS_APP_CONFIG_APPLICATION_ID:-}
      AWS_APP_CONFIG_ENVIRONMENT_ID: ${AWS_APP_CONFIG_ENVIRONMENT_ID:-}
      AWS_APP_CONFIG_PROFILE_ID: ${AWS_APP_CONFIG_PROFILE_ID:-}
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - memrag-network

  knowledge-ingestion:
    build:
      context: .
      dockerfile: services/knowledge-ingestion/Dockerfile
    container_name: memrag-knowledge-ingestion
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      WORKSPACE_ID: ${WORKSPACE_ID:-default-workspace}
      TEMPORAL_HOST: temporal:7233
      QDRANT_HOST: qdrant:6333
      MINIO_URL: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: memrag
      OLLAMA_HOST: http://ollama:11434
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CONFLUENCE_BASE_URL: ${CONFLUENCE_BASE_URL:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-memrag-archive}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_S3_FORCE_PATH_STYLE: ${AWS_S3_FORCE_PATH_STYLE:-true}
      AWS_SECRETS_MANAGER_PREFIX: ${AWS_SECRETS_MANAGER_PREFIX:-/memrag/development}
      AWS_SECRETS_MANAGER_ENDPOINT_URL: ${AWS_SECRETS_MANAGER_ENDPOINT_URL:-}
      AWS_RDS_REGION: ${AWS_RDS_REGION:-us-east-1}
      AWS_RDS_IAM_ENABLED: ${AWS_RDS_IAM_ENABLED:-false}
      AWS_RDS_SSL_MODE: ${AWS_RDS_SSL_MODE:-require}
    depends_on:
      temporal:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - memrag-network

  memory-api:
    build:
      context: .
      dockerfile: services/memory-api/Dockerfile
    container_name: memrag-memory-api
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/memrag?sslmode=disable
      QDRANT_HOST: qdrant:6333
      REDIS_URL: redis://redis:6379
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-gemma4:12b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-qwen3-embedding:4b}
      GRAPHITI_ENABLED: ${GRAPHITI_ENABLED:-false}
      GRAPHITI_SERVER_URL: ${GRAPHITI_SERVER_URL:-http://graphiti-server:8100}
      GRAPHITI_MCP_SERVER_URL: ${GRAPHITI_MCP_SERVER_URL:-http://graphiti-mcp:8101}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-memrag-neo4j}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - memrag-network

  neo4j:
    image: neo4j:5.20
    container_name: memrag-neo4j
    profiles: ["graphiti"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-memrag-neo4j}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/7687' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - memrag-network

  graphiti-server:
    image: zep/graphiti-server:0.3
    container_name: memrag-graphiti-server
    profiles: ["graphiti"]
    environment:
      OPENAI_BASE_URL: http://ollama:11434
      OPENAI_MODEL: ${OLLAMA_CHAT_MODEL:-gemma4:12b}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-memrag-neo4j}
    ports:
      - "8100:8100"
    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8100' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - memrag-network

  graphiti-mcp:
    image: zep/graphiti-mcp:0.3
    container_name: memrag-graphiti-mcp
    profiles: ["graphiti"]
    environment:
      GRAPHITI_SERVER_URL: ${GRAPHITI_SERVER_URL:-http://graphiti-server:8100}
    ports:
      - "8101:8101"
    depends_on:
      graphiti-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8101' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - memrag-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  ollama_data:
  prometheus_data:
  neo4j_data:

networks:
  memrag-network:
    driver: bridge
