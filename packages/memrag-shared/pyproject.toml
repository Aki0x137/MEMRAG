[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "memrag-shared"
version = "0.1.0"
description = "Shared library for MEMRAG — Production Memory, RAG & BYOD Knowledge Platform"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "MEMRAG Contributors"}
]

dependencies = [
    "boto3>=1.34.0",
    "botocore>=1.34.0",
    "redis>=5.0.0",
    "qdrant-client>=1.7.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.0.275",
    "mypy>=1.4.1",
    "black>=23.7.0",
    "boto3-stubs[sts,s3,iam]>=1.34.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/memrag_shared"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4"]
ignore = ["E501"]  # line-too-long (handled by black)

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = "test_*.py"
