global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'memory-api'
    static_configs:
      - targets: ['memory-api:8083']
    metrics_path: '/metrics'

  - job_name: 'knowledge-ingestion'
    static_configs:
      - targets: ['knowledge-ingestion:8080']
    metrics_path: '/metrics'

  - job_name: 'connector-registry'
    static_configs:
      - targets: ['connector-registry:8082']
    metrics_path: '/metrics'
